# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: python
    region: singapore         # Chọn region gần user nhất
    plan: free                # free | starter | standard | pro

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health   # Render check path này

    autoDeploy: true           # Auto deploy khi push to GitHub

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      # Secrets — set qua Render Dashboard (không commit giá trị thật)
      - key: OPENAI_API_KEY
        sync: false            # sync: false = set thủ công trên dashboard
      - key: AGENT_API_KEY
        generateValue: true    # Render tự sinh random value

    # Disk (nếu agent cần lưu file)
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

  # ──────────────────────────────────────
  # Redis (dùng Render Redis add-on)
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ============================================================
# Cách deploy:
#   1. Push code lên GitHub
#   2. Render Dashboard → New → Blueprint
#   3. Connect repo → Render đọc render.yaml này
#   4. Review và Deploy
# ============================================================
